<div class="po-wrapper">
  <po-menu
    [p-filter]="true"
    [p-menus]="menus"
    [p-service]="menuFilterService"
    [p-automatic-toggle]="true"
  >
    <div *p-menu-header-template class="po-p-2 po-font-title sample-menu-header-text-color">
      <p>Bem-vindo,</p>
      <p>
        <b>{{ nomeUsuario }}</b>
      </p>
    </div>
  </po-menu>

  <po-toolbar
    [p-title]="nomeSistema"
    [p-show-notification]="false"
    [p-profile]="profile"
    [p-profile-actions]="profileActions"
  >
  </po-toolbar>

  <router-outlet></router-outlet>
</div>
